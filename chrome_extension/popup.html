<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Garage Devis Automatique</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --accent: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
      --accent-hover: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      width: 360px;
      margin: 0;
      padding: 20px;
      background: var(--bg-gradient);
      color: var(--text);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.72);
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    button.btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button.btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3), 0 4px 6px -2px rgba(37, 99, 235, 0.05);
    }

    button.btn-primary:active {
      transform: translateY(0);
    }

    button.btn-secondary {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button.btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      margin: 20px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 1s ease-in-out infinite;
    }

    .loader-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-muted);
      animation: pulse 1.5s ease-in-out infinite;
      text-align: center;
    }

    .results-container {
      display: none;
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 12px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
    }

    .results-title {
      font-size: 13px;
      font-weight: 600;
      color: #60a5fa;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .review-section {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .review-section h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: #bfdbfe;
      letter-spacing: 0;
    }

    .review-list {
      margin: 0;
      padding-left: 16px;
      color: #dbeafe;
      font-size: 11px;
      line-height: 1.45;
    }

    .review-list li + li {
      margin-top: 4px;
    }

    .totals-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      font-size: 11px;
      color: #dbeafe;
    }

    .totals-grid .amount {
      font-weight: 700;
      color: #f8fafc;
      text-align: right;
    }

    .warnings-box {
      display: none;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(245, 158, 11, 0.14);
      border: 1px solid rgba(245, 158, 11, 0.36);
      border-radius: 6px;
      color: #fde68a;
      font-size: 11px;
      line-height: 1.45;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #e2e8f0;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      border-radius: 6px;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h2>Garage Devis Automatique</h2>
  
  <div class="form-group">
    <label for="plate">Plaque d'immatriculation</label>
    <input type="text" id="plate" placeholder="Ex: VD 123456" required>
  </div>

  <div class="form-group">
    <label for="client-name">Client</label>
    <input type="text" id="client-name" placeholder="Nom du client (optionnel)">
  </div>

  <div class="form-group">
    <label for="vehicle-label">Véhicule</label>
    <input type="text" id="vehicle-label" placeholder="Ex: VW Golf 1.4 TSI (optionnel)">
  </div>

  <div class="form-group">
    <label for="operation-type">Opération</label>
    <input type="text" id="operation-type" placeholder="Travaux atelier">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="labor-hours">Heures MO</label>
      <input type="number" id="labor-hours" min="0" step="0.1" placeholder="Optionnel">
    </div>

    <div class="form-group">
      <label for="hourly-rate">Taux CHF/h</label>
      <input type="number" id="hourly-rate" min="0" step="1" placeholder="145">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="fee-label">Frais</label>
      <input type="text" id="fee-label" placeholder="Ex: recyclage">
    </div>

    <div class="form-group">
      <label for="fee-amount">Frais CHF HT</label>
      <input type="number" id="fee-amount" min="0" step="0.05" placeholder="Optionnel">
    </div>
  </div>

  <div class="form-group">
    <label for="margin">Marge bénéficiaire (%)</label>
    <select id="margin">
      <option value="10">10%</option>
      <option value="15">15%</option>
      <option value="20" selected>20% (Par défaut)</option>
      <option value="25">25%</option>
      <option value="30">30%</option>
      <option value="40">40%</option>
      <option value="50">50%</option>
    </select>
  </div>

  <div class="form-group">
    <label for="export-target">Export cible</label>
    <select id="export-target">
      <option value="text" selected>Texte + CSV + PDF</option>
      <option value="csv">CSV</option>
      <option value="pdf">PDF</option>
      <option value="bexio_draft">bexio draft dry-run</option>
      <option value="winbiz_import">Winbiz import</option>
      <option value="cresus_import">Crésus import</option>
    </select>
  </div>

  <button id="generate-btn" class="btn-primary">Générer le Devis</button>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <div class="loader-text">Extraction et génération du Devis par l'IA...<br><span style="font-size: 10px; color: #f43f5e;">(L'éveil initial du serveur peut prendre 50s)</span></div>
  </div>

  <div id="results" class="results-container">
    <div class="results-header">
      <span class="results-title">Devis généré</span>
      <div class="button-group">
        <button id="copy-btn" class="btn-secondary">Copier texte</button>
        <button id="copy-csv-btn" class="btn-secondary">Copier CSV</button>
        <button id="csv-btn" class="btn-secondary">CSV</button>
        <button id="pdf-btn" class="btn-secondary">PDF</button>
        <button id="share-btn" class="btn-secondary">WhatsApp</button>
      </div>
    </div>
    <div id="warnings" class="warnings-box"></div>
    <div class="review-section">
      <h3>Lignes générées</h3>
      <ul id="parts-summary" class="review-list"></ul>
    </div>
    <div class="review-section">
      <h3>Totaux</h3>
      <div id="totals-summary" class="totals-grid"></div>
    </div>
    <pre id="devis-text"></pre>
  </div>

  <div class="footer">
    Propulsé par Google Gemini AI & FastAPI
  </div>

  <script src="popup.js"></script>
</body>
</html>
